# 레플리카 수
replicaCount: 2

# 컨테이너 이미지 설정
image:
  repository: hello-pet/pet-service
  pullPolicy: IfNotPresent
  tag: ""  # CI에서 주입 (latest 금지)

# 이미지 Pull Secret (private registry 사용 시)
imagePullSecrets: [ ]

# Service Account 설정
serviceAccount:
  create: false
  annotations: { }
  name: ""

# Pod annotations
podAnnotations: { }

# Pod security context
podSecurityContext: { }
# fsGroup: 2000

# Container security context
securityContext: { }
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# Kubernetes Service 설정
service:
  type: ClusterIP
  port: 8085
  targetPort: 8085

# 리소스 limits 및 requests (요청<제한 권장)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler (선택사항)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: { }

# Tolerations
tolerations: [ ]

# Affinity
affinity: { }

# Liveness Probe 설정
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8085
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness Probe 설정
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8085
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Spring Boot 설정
spring:
  profile: prod

# 데이터베이스 설정
database:
  url: "jdbc:postgresql://hello-pet-test-postgres.chom0cams7kg.ap-northeast-3.rds.amazonaws.com:5432/db-pet"
  username: "hellopetadmin"
  password: "!admin123"

# Secret 관리 방식
secret:
  create: true
  externalSecret:
    enabled: false
