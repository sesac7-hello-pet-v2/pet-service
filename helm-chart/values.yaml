# Default values for pet-service Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# 레플리카 수
replicaCount: 2

# 컨테이너 이미지 설정
image:
  repository: hello-pet/pet-service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# 이미지 Pull Secret (private registry 사용 시)
imagePullSecrets: []

# Service Account 설정
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Kubernetes Service 설정
service:
  type: ClusterIP
  port: 8085
  targetPort: 8085
  # NodePort (service.type이 NodePort인 경우)
  # nodePort: 30085

# 리소스 limits 및 requests
resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler (선택사항)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Liveness Probe 설정
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8085
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness Probe 설정
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8085
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Spring Boot 설정
spring:
  profile: prod

# 데이터베이스 설정
database:
  # RDS 엔드포인트
  url: "jdbc:postgresql://your-rds-endpoint.region.rds.amazonaws.com:5432/db-pet"
  username: "hellopetadmin"
  # 비밀번호는 배포 시 --set database.password=${{ secrets.DB_PASSWORD }} 로 전달
  # password: ""  # GitHub Secrets에서 관리

# Secret 관리 방식
secret:
  # 방식 1: Helm values에서 관리 (개발/테스트 환경)
  create: true
  # database.password를 여기 설정하면 Secret 생성
  # 운영 환경에서는 create: false로 설정하고 외부 Secret 사용 권장

  # 방식 2: External Secrets Operator 사용 (운영 환경 권장)
  externalSecret:
    enabled: false
    # AWS Secrets Manager, Azure Key Vault 등과 연동

# Namespace (인프라 팀이 미리 생성해야 함)
# kubectl create namespace hello-pet
namespace: hello-pet
