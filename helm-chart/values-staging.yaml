# Staging Environment Values
# helm install pet-service ./helm-chart -f values-staging.yaml

# Staging은 Prod와 동일한 환경, 약간 축소된 리소스
replicaCount: 2

image:
  # Staging에서는 릴리스 후보 버전 테스트
  tag: "rc-1.0.0"
  pullPolicy: Always

# Staging 환경 리소스 (Prod보다 약간 작음)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Spring Boot Profile
spring:
  profile: staging

# Staging RDS 엔드포인트 (Prod와 동일한 구성, 다른 인스턴스)
database:
  url: "jdbc:postgresql://staging-rds-endpoint.region.rds.amazonaws.com:5432/db-pet-staging"
  username: "hellopetadmin"
  # password는 배포 시 GitHub Secrets에서 자동 주입됨

# Staging에서는 Helm으로 Secret 생성 (간편함)
# Prod 전환 시 External Secrets 고려
secret:
  create: true

# HPA 활성화 (Prod 시뮬레이션)
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
